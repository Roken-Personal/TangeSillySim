name: Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  BUILD_TYPE: Debug

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE

      - name: Build
        run: cmake --build build --config $BUILD_TYPE

      # Tests are currently skipped because the simulator test suite has
      # failing/hanging tests on GitHub Actions.
      # Re-enable once the native tests are fixed.
      #
      # - name: Test
      #   working-directory: build
      #   run: ctest -C $BUILD_TYPE -V

      - name: Build Emscripten assets
        run: |
          mkdir -p website/emscripten
          docker run --rm -v "$PWD:/src" trzeci/emscripten /bin/bash -c "cd website/emscripten && emcmake cmake ../.. -DEMSCRIPTEN=True && emmake make"
